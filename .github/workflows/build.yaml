name: Builds
run-name: Builds - ${{ github.event.head_commit.message }}

on:
   push:
   pull_request:
   workflow_dispatch:

jobs:
  build:
    name: Build matid ${{ matrix.matid }} ${{ matrix.compilerEnv }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.GithubActionsIgnoreFail }}
    strategy:
      fail-fast: false
      matrix:
        include:

          - matid: 01
            os: windows-2025
            compilerEnv: cygwin
            GithubActionsIgnoreFail: false

          - matid: 02
            os: windows-2025
            compilerEnv: MINGW32
            shellEnv: msys2 {0}
            GithubActionsIgnoreFail: true

          - matid: 03
            os: windows-2025
            compilerEnv: UCRT64
            shellEnv: msys2 {0}
            GithubActionsIgnoreFail: true

    defaults:
      run:
        shell: ${{ matrix.shellEnv || 'bash' }}

    steps:

      - name: Windows Machine Stats systeminfo
        if: ${{ matrix.os == 'windows-2025' }}
        shell: cmd
        run: |
          systeminfo

      - name: Matrix Variables
        if: matrix.os == 'windows-2025'
        shell: bash                     # redundant, because it is my defined matrix default
        run: |
          echo "Hello from Windows and Bash.  I do exist!"

        # OUT OF TIME RIGHT NOW.  IN THE FUTURE, CONVERT EVERYTHING "BELOW" "TO" BASH
      - name: Matrix Variables
        if: matrix.os == 'windows-2025'
        shell: powershell
        run: |
          # systeminfo
          echo "${{ matrix.compilerEnv }} on ${{ matrix.os }}"
  
          function Set-EnvVar {param($X)     Add-Content -Path ${env:GITHUB_ENV} -Value "$X"}
          #
          ${env:HEAD7_GITHUB_SHA} = "${env:GITHUB_SHA}".SubString(0,7)
          Set-EnvVar "HEAD7_GITHUB_SHA=${env:HEAD7_GITHUB_SHA}"

          echo "HEAD7_GITHUB_SHA: ${env:HEAD7_GITHUB_SHA}"

          ${env:os} = "${{ matrix.os }}"
          if("${env:os}" -eq ""){${env:os} = "notset"}
          Set-EnvVar "os=${env:os}"

          echo "os: ${env:os}"

          ${env:compilerEnv} = "${{ matrix.compilerEnv }}"
          if("${env:compilerEnv}" -eq ""){${env:compilerEnv} = "notset"}
          Set-EnvVar "compilerEnv=${env:compilerEnv}"

          echo "compilerEnv: ${env:compilerEnv}"

          ${env:compilerClass} = "notset"
          # "CLANG32" - not supported by Github Action msys2/setup-msys2@v2"
          if("${env:compilerEnv}" -in "MING64", "MINGW32", "UCRT64", "CLANG64", "CLANGARM64") {
            ${env:compilerClass} = "MSYS2"
          }
          if("${env:compilerEnv}" -eq "cygwin") {
            ${env:compilerClass} = "cygwin"
          }
          Set-EnvVar "compilerClass=${env:compilerClass}"

          echo "compilerClass: ${env:compilerClass}"

          ${env:compilerExe} = "notset"
          if ( "${{ matrix.compilerEnv }}" -eq "MINGW64"    ) { ${env:compilerExe} = "gcc" }
          if ( "${{ matrix.compilerEnv }}" -eq "MINGW32"    ) { ${env:compilerExe} = "gcc" }
          if ( "${{ matrix.compilerEnv }}" -eq "UCRT64"     ) { ${env:compilerExe} = "gcc" }
          # if ( "${{ matrix.compilerEnv }}" -eq "CLANG32"    ) { ${env:compilerExe} = "clang" }
          if ( "${{ matrix.compilerEnv }}" -eq "CLANG64"    ) { ${env:compilerExe} = "clang" }
          if ( "${{ matrix.compilerEnv }}" -eq "CLANGARM64" ) { ${env:compilerExe} = "clang" }
          if("${env:compilerExe}" -eq ""){${env:compilerExe} = "notset"}
          Set-EnvVar "compilerExe=${env:compilerExe}"

          echo "compilerExe: ${env:compilerExe}"

          ${env:mingw_env} = "notset"
          if ( "${{ matrix.compilerEnv }}" -eq "MINGW64"    ) { ${env:mingw_env} = "x86_64" }
          if ( "${{ matrix.compilerEnv }}" -eq "MINGW32"    ) { ${env:mingw_env} = "i686" }
          if ( "${{ matrix.compilerEnv }}" -eq "UCRT64"     ) { ${env:mingw_env} = "ucrt-x86_64" }
          # if ( "${{ matrix.compilerEnv }}" -eq "CLANG32"    ) { ${env:mingw_env} = "clang-i686" }
          if ( "${{ matrix.compilerEnv }}" -eq "CLANG64"    ) { ${env:mingw_env} = "clang-x86_64" }
          if ( "${{ matrix.compilerEnv }}" -eq "CLANGARM64" ) { ${env:mingw_env} = "clang-aarch64" }
          if ( "${{ matrix.compilerEnv }}" -eq "notset"     ) { ${env:mingw_env} = "notset" }
          Set-EnvVar "mingw_env=${env:mingw_env}"

          echo "mingw_env: ${env:mingw_env}"

          ${env:MINGW_PACKAGE_PREFIX} = "notset"
          if ("${{ env.mingw_env }}" -ne "notset") { ${env:MINGW_PACKAGE_PREFIX} = "mingw-w64-${env:mingw_env}" }
          if ("${{ env.mingw_env }}" -eq "notset") { ${env:MINGW_PACKAGE_PREFIX} = "notset" }
          Set-EnvVar "MINGW_PACKAGE_PREFIX=${env:MINGW_PACKAGE_PREFIX}"

          echo "MINGW_PACKAGE_PREFIX: ${env:MINGW_PACKAGE_PREFIX}"

      - name: Install Windows mingw Software on ${{ matrix.compilerEnv }}
        if: ${{ env.os == 'windows-2025' && env.compilerClass == 'MSYS2' }}
        uses: msys2/setup-msys2@v2
        with:
          update: true
          path-type: strict
          msystem: ${{ env.compilerEnv }}
          install: >-
            ${{ env.MINGW_PACKAGE_PREFIX }}-diffutils

      - name: Set Variables on ${{ matrix.compilerEnv }}
        if: ${{ env.os == 'windows-2025' && env.compilerClass == 'MSYS2' }}
        env:
          # Msys OS variable
          msystem: ${{ env.compilerEnv }}
        run: |
          set -x -v -e
          echo "MINGW_PACKAGE_PREFIX: ${MINGW_PACKAGE_PREFIX}"

      - name: Install Windows mingw Software Packages on ${{ matrix.compilerEnv }}
        if: ${{ env.os == 'windows-2025' && env.compilerClass == 'MSYS2' }}
        env:
          # Msys OS variable
          msystem: ${{ env.compilerEnv }}
        run: |
          set -x -v -e
          echo "MINGW_PACKAGE_PREFIX: ${MINGW_PACKAGE_PREFIX}"
          pacman --noconfirm -S --needed  ${MINGW_PACKAGE_PREFIX}-7zip
